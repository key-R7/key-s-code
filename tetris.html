<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页版俄罗斯方块</title>
  <style>
    :root {
      --bg-top: #102038;
      --bg-bottom: #050913;
      --panel: rgba(9, 16, 31, 0.86);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #ecf4ff;
      --muted: #9db1ca;
      --accent: #ffd166;
      --grid: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(78, 205, 196, 0.28), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255, 99, 72, 0.25), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      padding: 24px;
    }

    .app {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(220px, 280px);
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .board-panel {
      padding: 20px;
    }

    .sidebar {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    canvas {
      display: block;
      width: 100%;
      image-rendering: pixelated;
    }

    #board {
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        #07111f;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
    }

    .next-wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    #next {
      width: 140px;
      height: 140px;
      border-radius: 16px;
      background: #091321;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      color: #08111d;
      background: linear-gradient(135deg, #ffd166, #ff9f1c);
      box-shadow: 0 14px 32px rgba(255, 159, 28, 0.3);
    }

    .secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    ul {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .status {
      min-height: 24px;
      color: var(--accent);
      font-weight: 600;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel board-panel">
      <h1>俄罗斯方块</h1>
      <p class="subtitle">经典玩法，键盘直接开玩</p>
      <canvas id="board" width="300" height="600" aria-label="游戏主画布"></canvas>
    </section>

    <aside class="panel sidebar">
      <div class="card stats">
        <div>
          <div class="label">分数</div>
          <div class="value" id="score">0</div>
        </div>
        <div>
          <div class="label">等级</div>
          <div class="value" id="level">1</div>
        </div>
        <div>
          <div class="label">消行</div>
          <div class="value" id="lines">0</div>
        </div>
        <div>
          <div class="label">最高分</div>
          <div class="value" id="high-score">0</div>
        </div>
      </div>

      <div class="card next-wrap">
        <div class="label">下一块</div>
        <canvas id="next" width="140" height="140" aria-label="下一块预览"></canvas>
      </div>

      <div class="card">
        <div class="status" id="status">按“开始游戏”启动</div>
        <div class="actions">
          <button class="primary" id="start-btn">开始游戏</button>
          <button class="secondary" id="pause-btn">暂停</button>
        </div>
      </div>

      <div class="card">
        <div class="label">操作说明</div>
        <ul>
          <li>← →：左右移动</li>
          <li>↑ / X：旋转</li>
          <li>↓：加速下落</li>
          <li>空格：直接落到底</li>
          <li>P：暂停 / 继续</li>
        </ul>
      </div>
    </aside>
  </main>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;
    const PREVIEW_BLOCK = 28;
    const SHAPES = {
      I: [[1, 1, 1, 1]],
      O: [[1, 1], [1, 1]],
      T: [[0, 1, 0], [1, 1, 1]],
      S: [[0, 1, 1], [1, 1, 0]],
      Z: [[1, 1, 0], [0, 1, 1]],
      J: [[1, 0, 0], [1, 1, 1]],
      L: [[0, 0, 1], [1, 1, 1]]
    };
    const COLORS = {
      I: "#4ecdc4",
      O: "#ffe66d",
      T: "#ff6b6b",
      S: "#2ecc71",
      Z: "#ff8c42",
      J: "#54a0ff",
      L: "#c77dff"
    };
    const SCORE_TABLE = [0, 100, 300, 500, 800];

    const boardCanvas = document.getElementById("board");
    const boardCtx = boardCanvas.getContext("2d");
    const nextCanvas = document.getElementById("next");
    const nextCtx = nextCanvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const linesEl = document.getElementById("lines");
    const highScoreEl = document.getElementById("high-score");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("start-btn");
    const pauseBtn = document.getElementById("pause-btn");

    let board = [];
    let current = null;
    let nextPiece = null;
    let dropCounter = 0;
    let lastTime = 0;
    let score = 0;
    let lines = 0;
    let level = 1;
    let highScore = Number(localStorage.getItem("tetris-high-score") || 0);
    let gameOver = false;
    let isRunning = false;
    let isPaused = false;
    let animationId = 0;

    highScoreEl.textContent = highScore;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function cloneShape(shape) {
      return shape.map(row => [...row]);
    }

    function randomType() {
      const keys = Object.keys(SHAPES);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    function createPiece(type = randomType()) {
      const shape = cloneShape(SHAPES[type]);
      return {
        type,
        shape,
        color: COLORS[type],
        x: Math.floor((COLS - shape[0].length) / 2),
        y: 0
      };
    }

    function resetGame() {
      board = createBoard();
      score = 0;
      lines = 0;
      level = 1;
      gameOver = false;
      isPaused = false;
      dropCounter = 0;
      lastTime = 0;
      nextPiece = createPiece();
      spawnPiece();
      updateHud();
      setStatus("游戏进行中");
    }

    function spawnPiece() {
      current = nextPiece || createPiece();
      current.x = Math.floor((COLS - current.shape[0].length) / 2);
      current.y = 0;
      nextPiece = createPiece();
      if (collides(current)) {
        endGame();
      }
    }

    function collides(piece, offsetX = 0, offsetY = 0, testShape = piece.shape) {
      for (let y = 0; y < testShape.length; y++) {
        for (let x = 0; x < testShape[y].length; x++) {
          if (!testShape[y][x]) {
            continue;
          }
          const newX = piece.x + x + offsetX;
          const newY = piece.y + y + offsetY;
          if (newX < 0 || newX >= COLS || newY >= ROWS) {
            return true;
          }
          if (newY >= 0 && board[newY][newX]) {
            return true;
          }
        }
      }
      return false;
    }

    function mergePiece() {
      current.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            const boardY = current.y + y;
            if (boardY >= 0) {
              board[boardY][current.x + x] = current.color;
            }
          }
        });
      });
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(cell => cell)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared > 0) {
        lines += cleared;
        score += SCORE_TABLE[cleared] * level;
        level = Math.floor(lines / 10) + 1;
        updateHud();
      }
    }

    function rotate(shape) {
      return shape[0].map((_, index) => shape.map(row => row[index]).reverse());
    }

    function rotateCurrent() {
      const rotated = rotate(current.shape);
      if (!collides(current, 0, 0, rotated)) {
        current.shape = rotated;
        return;
      }

      const kicks = [-1, 1, -2, 2];
      for (const kick of kicks) {
        if (!collides(current, kick, 0, rotated)) {
          current.x += kick;
          current.shape = rotated;
          return;
        }
      }
    }

    function move(dx) {
      if (!isRunning || isPaused || gameOver) {
        return;
      }
      if (!collides(current, dx, 0)) {
        current.x += dx;
      }
    }

    function hardDrop() {
      if (!isRunning || isPaused || gameOver) {
        return;
      }
      while (!collides(current, 0, 1)) {
        current.y++;
        score += 2;
      }
      lockPiece();
      updateHud();
    }

    function softDrop() {
      if (!isRunning || isPaused || gameOver) {
        return;
      }
      if (!collides(current, 0, 1)) {
        current.y++;
        score += 1;
        updateHud();
      } else {
        lockPiece();
      }
    }

    function lockPiece() {
      mergePiece();
      clearLines();
      spawnPiece();
      updateHud();
    }

    function dropInterval() {
      return Math.max(90, 850 - (level - 1) * 70);
    }

    function update(time = 0) {
      if (!isRunning) {
        return;
      }
      const delta = time - lastTime;
      lastTime = time;

      if (!isPaused && !gameOver) {
        dropCounter += delta;
        if (dropCounter >= dropInterval()) {
          if (!collides(current, 0, 1)) {
            current.y++;
          } else {
            lockPiece();
          }
          dropCounter = 0;
        }
        draw();
      }

      animationId = requestAnimationFrame(update);
    }

    function drawCell(ctx, x, y, color, size) {
      ctx.fillStyle = color;
      ctx.fillRect(x * size, y * size, size, size);
      ctx.fillStyle = "rgba(255, 255, 255, 0.16)";
      ctx.fillRect(x * size, y * size, size, 4);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
      ctx.strokeRect(x * size + 0.5, y * size + 0.5, size - 1, size - 1);
    }

    function drawGrid() {
      boardCtx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          boardCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid");
          boardCtx.strokeRect(x * BLOCK + 0.5, y * BLOCK + 0.5, BLOCK - 1, BLOCK - 1);
          if (board[y][x]) {
            drawCell(boardCtx, x, y, board[y][x], BLOCK);
          }
        }
      }
    }

    function drawGhost() {
      let ghostY = current.y;
      while (!collides({ ...current, y: ghostY }, 0, 1)) {
        ghostY++;
      }
      current.shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            boardCtx.fillStyle = "rgba(255, 255, 255, 0.14)";
            boardCtx.fillRect((current.x + x) * BLOCK, (ghostY + y) * BLOCK, BLOCK, BLOCK);
          }
        });
      });
    }

    function drawPiece(piece, ctx, size, centered = false) {
      const shape = piece.shape;
      const offsetX = centered ? Math.floor((ctx.canvas.width - shape[0].length * size) / 2) : 0;
      const offsetY = centered ? Math.floor((ctx.canvas.height - shape.length * size) / 2) : 0;
      shape.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            if (centered) {
              ctx.fillStyle = piece.color;
              ctx.fillRect(offsetX + x * size, offsetY + y * size, size, size);
              ctx.fillStyle = "rgba(255, 255, 255, 0.16)";
              ctx.fillRect(offsetX + x * size, offsetY + y * size, size, 4);
              ctx.strokeStyle = "rgba(255,255,255,0.12)";
              ctx.strokeRect(offsetX + x * size + 0.5, offsetY + y * size + 0.5, size - 1, size - 1);
            } else {
              drawCell(ctx, piece.x + x, piece.y + y, piece.color, size);
            }
          }
        });
      });
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      drawPiece({ ...nextPiece, x: 0, y: 0 }, nextCtx, PREVIEW_BLOCK, true);
    }

    function drawOverlay(text) {
      boardCtx.fillStyle = "rgba(5, 9, 19, 0.68)";
      boardCtx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
      boardCtx.fillStyle = "#ecf4ff";
      boardCtx.textAlign = "center";
      boardCtx.font = "700 30px Segoe UI";
      boardCtx.fillText(text, boardCanvas.width / 2, boardCanvas.height / 2);
    }

    function draw() {
      drawGrid();
      if (current && !gameOver) {
        drawGhost();
        drawPiece(current, boardCtx, BLOCK);
      }
      drawNext();
      if (isPaused) {
        drawOverlay("已暂停");
      } else if (gameOver) {
        drawOverlay("游戏结束");
      }
    }

    function updateHud() {
      scoreEl.textContent = score;
      levelEl.textContent = level;
      linesEl.textContent = lines;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("tetris-high-score", String(highScore));
        highScoreEl.textContent = highScore;
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function startGame() {
      cancelAnimationFrame(animationId);
      isRunning = true;
      resetGame();
      draw();
      animationId = requestAnimationFrame(update);
    }

    function togglePause() {
      if (!isRunning || gameOver) {
        return;
      }
      isPaused = !isPaused;
      setStatus(isPaused ? "已暂停，按 P 或按钮继续" : "游戏进行中");
      draw();
    }

    function endGame() {
      gameOver = true;
      isRunning = false;
      setStatus("游戏结束，点击开始重新来一局");
      draw();
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["arrowleft", "arrowright", "arrowdown", "arrowup", " ", "p", "x"].includes(key)) {
        event.preventDefault();
      }

      if (key === "p") {
        togglePause();
        return;
      }

      if (!isRunning || isPaused || gameOver) {
        return;
      }

      if (key === "arrowleft") {
        move(-1);
      } else if (key === "arrowright") {
        move(1);
      } else if (key === "arrowdown") {
        softDrop();
      } else if (key === "arrowup" || key === "x") {
        rotateCurrent();
      } else if (key === " ") {
        hardDrop();
      }

      draw();
    });

    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);

    board = createBoard();
    nextPiece = createPiece();
    draw();
  </script>
</body>
</html>
